<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taqrizchi — Kirish</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #02AB6F 0%, #0288D1 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 36px;
            width: 100%; max-width: 400px;
            box-shadow: 0 24px 64px rgba(0,0,0,.18);
        }
        .logo {
            width: 64px; height: 64px; border-radius: 16px;
            background: linear-gradient(135deg, #02AB6F, #0288D1);
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; margin: 0 auto 20px;
        }
        h1 {
            text-align: center; font-size: 22px; font-weight: 800;
            color: #1e293b; margin-bottom: 4px;
        }
        .sub {
            text-align: center; font-size: 13px; color: #94a3b8;
            margin-bottom: 28px;
        }
        .error-box {
            background: #fee2e2; color: #991b1b;
            border-radius: 10px; padding: 11px 16px;
            font-size: 13px; margin-bottom: 18px;
            border-left: 3px solid #ef4444;
        }
        label {
            display: block; font-size: 13px; font-weight: 600;
            color: #374151; margin-bottom: 6px;
        }
        input[type=text], input[type=password] {
            width: 100%; padding: 12px 14px;
            border: 1.5px solid #e2e8f0; border-radius: 10px;
            font-size: 14px; font-family: inherit;
            transition: border .2s; margin-bottom: 14px;
        }
        input:focus { outline: none; border-color: #02AB6F; }
        button {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, #02AB6F, #0288D1);
            color: white; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            transition: opacity .2s; margin-top: 6px;
        }
        button:hover { opacity: .9; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">🔬</div>
    <h1>Taqrizchi Kabineti</h1>
    <p class="sub">Ilmiy Jurnal — Taqrizchilar tizimi</p>

    {% if error %}
    <div class="error-box">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <label>Username</label>
        <input type="text" name="username" autocomplete="username" required>

        <label>Parol</label>
        <input type="password" name="password" autocomplete="current-password" required>

        <button type="submit">Kirish →</button>
    </form>
</div>
</body>
</html>
